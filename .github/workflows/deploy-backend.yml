name: Deploy Backend (Sync to backend-deploy)

on:
  push:
    tags:
      - 'backend-v*'

jobs:
  sync-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git push origin HEAD:refs/heads/backend-deploy --force
