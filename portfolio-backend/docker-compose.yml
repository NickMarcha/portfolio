version: '3.8'

services:
  backend:
    build: .
    container_name: portfolio-backend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - visit-data:/app/data
    env_file:
      - stack.env
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - NTFY_TOKEN=${NTFY_TOKEN}
      - NTFY_BASE_URL=${NTFY_BASE_URL}
      - NTFY_TOPIC=${NTFY_TOPIC}
    networks:
      - tunnel-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    depends_on:
      - backend
    entrypoint: cloudflared
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - "${CLOUDFLARE_TOKEN}"
    env_file:
      - stack.env
    networks:
      - tunnel-net

volumes:
  visit-data:

networks:
  tunnel-net:
    driver: bridge
